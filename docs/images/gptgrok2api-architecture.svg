<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">GPTGrok2API 系统结构</title>
  <desc id="desc">展示客户端、GPTGrok2API 网关、iCloud Privacy Mail sidecar、注册与 Checkout 任务以及数据存储之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7a90" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#17243b" flood-opacity="0.10" />
    </filter>
    <style>
      .title { font: 700 32px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #14213d; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #61708a; }
      .boundary-label { font: 700 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #30415e; }
      .node-title { font: 700 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17243b; }
      .node-text { font: 400 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #52627b; }
      .small-text { font: 400 12px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; fill: #68768b; }
      .boundary { stroke-width: 1.5; rx: 18; }
      .node { stroke-width: 1.3; rx: 12; filter: url(#shadow); }
      .edge { fill: none; stroke: #77869b; stroke-width: 2; marker-end: url(#arrow); }
      .edge-soft { fill: none; stroke: #a5b1c1; stroke-width: 1.6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#f7f9fc" />
  <text x="70" y="58" class="title">GPTGrok2API 系统结构</text>
  <text x="70" y="88" class="subtitle">统一 API 网关 · GPT / Grok 运行时 · 注册与支付流程 · iCloud Privacy Mail</text>

  <!-- Entry layer -->
  <rect x="60" y="125" width="1480" height="130" class="boundary" fill="#ffffff" stroke="#d7deea" />
  <text x="85" y="155" class="boundary-label">入口层</text>
  <rect x="90" y="175" width="300" height="58" class="node" fill="#edf5ff" stroke="#a9c9f6" />
  <text x="240" y="200" text-anchor="middle" class="node-title">OpenAI SDK / 第三方客户端</text>
  <text x="240" y="220" text-anchor="middle" class="small-text">Chat · Responses · Images · Messages</text>
  <rect x="455" y="175" width="300" height="58" class="node" fill="#edf5ff" stroke="#a9c9f6" />
  <text x="605" y="200" text-anchor="middle" class="node-title">Vue 管理控制台</text>
  <text x="605" y="220" text-anchor="middle" class="small-text">账号 · 注册 · iCloud · Checkout · 日志</text>
  <rect x="820" y="175" width="300" height="58" class="node" fill="#edf5ff" stroke="#a9c9f6" />
  <text x="970" y="200" text-anchor="middle" class="node-title">Sub2API</text>
  <text x="970" y="220" text-anchor="middle" class="small-text">Docker 内部网络接入</text>
  <rect x="1185" y="175" width="300" height="58" class="node" fill="#f3f5f8" stroke="#c7d0dc" />
  <text x="1335" y="200" text-anchor="middle" class="node-title">反向代理 / HTTPS</text>
  <text x="1335" y="220" text-anchor="middle" class="small-text">可选 Nginx 或其他入口</text>

  <!-- Main gateway -->
  <rect x="60" y="300" width="1010" height="250" class="boundary" fill="#eef6ff" stroke="#a9c9f6" />
  <text x="85" y="330" class="boundary-label">GPTGrok2API 主网关（FastAPI）</text>
  <rect x="95" y="365" width="260" height="105" class="node" fill="#ffffff" stroke="#91b8ee" />
  <text x="225" y="397" text-anchor="middle" class="node-title">认证与模型路由</text>
  <text x="225" y="422" text-anchor="middle" class="node-text">Bearer 身份认证</text>
  <text x="225" y="444" text-anchor="middle" class="node-text">统一模型目录 / 协议分流</text>
  <rect x="400" y="365" width="280" height="105" class="node" fill="#ffffff" stroke="#91b8ee" />
  <text x="540" y="397" text-anchor="middle" class="node-title">GPT 运行时</text>
  <text x="540" y="422" text-anchor="middle" class="node-text">账号池 · 搜索 · 图片</text>
  <text x="540" y="444" text-anchor="middle" class="node-text">编辑 · 文件 · PPT / PSD</text>
  <rect x="725" y="365" width="310" height="105" class="node" fill="#ffffff" stroke="#91b8ee" />
  <text x="880" y="397" text-anchor="middle" class="node-title">Grok 双运行时</text>
  <text x="880" y="422" text-anchor="middle" class="node-text">Grok SSO 账号池与媒体能力</text>
  <text x="880" y="444" text-anchor="middle" class="node-text">Build OAuth Token 刷新与探测</text>
  <path d="M240 255 L240 365" class="edge" />
  <path d="M605 255 L605 365" class="edge" />
  <path d="M970 255 L970 365" class="edge" />
  <path d="M1335 233 L1335 285 L225 285 L225 365" class="edge-soft" />
  <path d="M355 417 L400 417" class="edge" />
  <path d="M680 417 L725 417" class="edge" />

  <!-- iCloud sidecar -->
  <rect x="1100" y="300" width="440" height="250" class="boundary" fill="#f3efff" stroke="#c4b1f0" />
  <text x="1125" y="330" class="boundary-label">iCloud Privacy Mail sidecar</text>
  <text x="1125" y="350" class="small-text">Compose 内部网络 · 无独立账号 · 无宿主机端口</text>
  <rect x="1130" y="375" width="180" height="62" class="node" fill="#ffffff" stroke="#c4b1f0" />
  <text x="1220" y="401" text-anchor="middle" class="node-title">Apple 新接口</text>
  <text x="1220" y="421" text-anchor="middle" class="small-text">登录 / 2FA / 创建</text>
  <rect x="1330" y="375" width="180" height="62" class="node" fill="#ffffff" stroke="#c4b1f0" />
  <text x="1420" y="401" text-anchor="middle" class="node-title">iCloud 旧接口</text>
  <text x="1420" y="421" text-anchor="middle" class="small-text">登录 / 2FA / 同步</text>
  <rect x="1130" y="460" width="180" height="62" class="node" fill="#ffffff" stroke="#c4b1f0" />
  <text x="1220" y="486" text-anchor="middle" class="node-title">IMAP 取码</text>
  <text x="1220" y="506" text-anchor="middle" class="small-text">App 专用密码</text>
  <rect x="1330" y="460" width="180" height="62" class="node" fill="#ffffff" stroke="#c4b1f0" />
  <text x="1420" y="486" text-anchor="middle" class="node-title">定时创建</text>
  <text x="1420" y="506" text-anchor="middle" class="small-text">20 + 5 / 小时 · 750 / 账号</text>
  <path d="M1035 417 L1100 417" class="edge" />

  <!-- Control plane -->
  <rect x="60" y="590" width="1480" height="185" class="boundary" fill="#fffaf0" stroke="#f0cf91" />
  <text x="85" y="620" class="boundary-label">控制与业务任务层</text>
  <rect x="90" y="650" width="245" height="80" class="node" fill="#ffffff" stroke="#efc77e" />
  <text x="212" y="680" text-anchor="middle" class="node-title">注册引擎</text>
  <text x="212" y="703" text-anchor="middle" class="node-text">OpenAI / Grok 任务</text>
  <rect x="370" y="650" width="270" height="80" class="node" fill="#ffffff" stroke="#efc77e" />
  <text x="505" y="680" text-anchor="middle" class="node-title">邮箱 Provider 路由</text>
  <text x="505" y="703" text-anchor="middle" class="node-text">内置 iCloud / 外部邮箱</text>
  <rect x="675" y="650" width="270" height="80" class="node" fill="#ffffff" stroke="#efc77e" />
  <text x="810" y="680" text-anchor="middle" class="node-title">平台标签与领取</text>
  <text x="810" y="703" text-anchor="middle" class="node-text">GPT 绿色 · Grok 蓝色</text>
  <rect x="980" y="650" width="270" height="80" class="node" fill="#ffffff" stroke="#efc77e" />
  <text x="1115" y="680" text-anchor="middle" class="node-title">Checkout</text>
  <text x="1115" y="703" text-anchor="middle" class="node-text">UPI 最终链接 · sticky 出口</text>
  <rect x="1285" y="650" width="225" height="80" class="node" fill="#ffffff" stroke="#efc77e" />
  <text x="1397" y="680" text-anchor="middle" class="node-title">代理与观测</text>
  <text x="1397" y="703" text-anchor="middle" class="node-text">WARP · 日志 · 指标</text>
  <path d="M225 470 L225 650" class="edge-soft" />
  <path d="M505 650 L505 522" class="edge-soft" />
  <path d="M640 690 L675 690" class="edge" />
  <path d="M945 690 L980 690" class="edge" />
  <path d="M1250 690 L1285 690" class="edge-soft" />

  <!-- Data layer -->
  <rect x="60" y="815" width="1480" height="175" class="boundary" fill="#f1fbf7" stroke="#a8d9c6" />
  <text x="85" y="845" class="boundary-label">数据与运行时状态</text>
  <rect x="95" y="875" width="300" height="75" class="node" fill="#ffffff" stroke="#9fd3be" />
  <text x="245" y="905" text-anchor="middle" class="node-title">账号与平台标签</text>
  <text x="245" y="928" text-anchor="middle" class="node-text">JSON / SQLite / PostgreSQL / Git</text>
  <rect x="455" y="875" width="300" height="75" class="node" fill="#ffffff" stroke="#9fd3be" />
  <text x="605" y="905" text-anchor="middle" class="node-title">iCloud sidecar 状态</text>
  <text x="605" y="928" text-anchor="middle" class="node-text">登录态 · 邮箱 · 邮件缓存</text>
  <rect x="815" y="875" width="300" height="75" class="node" fill="#ffffff" stroke="#9fd3be" />
  <text x="965" y="905" text-anchor="middle" class="node-title">媒体与文件</text>
  <text x="965" y="928" text-anchor="middle" class="node-text">本地图片 · WebDAV</text>
  <rect x="1175" y="875" width="300" height="75" class="node" fill="#ffffff" stroke="#9fd3be" />
  <text x="1325" y="905" text-anchor="middle" class="node-title">备份与审计</text>
  <text x="1325" y="928" text-anchor="middle" class="node-text">本地归档 · R2 · 调用日志</text>
  <path d="M810 730 L245 875" class="edge-soft" />
  <path d="M1420 522 L605 875" class="edge-soft" />
  <path d="M540 470 L965 875" class="edge-soft" />
  <path d="M1397 730 L1325 875" class="edge-soft" />

  <text x="80" y="1020" class="small-text">实线：主要请求链路　虚线：后台任务、同步或状态写入</text>
</svg>
